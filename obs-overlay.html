<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(0px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(2px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(2px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(0deg); }
    }
    .shaking { animation: shake 0.5s infinite; }
    .engine-flash { animation: enginePulse 0.2s infinite alternate; }
    @keyframes enginePulse {
      0% { background-color: rgba(239, 68, 68, 0.4); }
      100% { background-color: rgba(59, 130, 246, 0.4); }
    }
    @keyframes msgIn {
      0% { opacity: 0; transform: translateY(12px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes msgOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: filter(blur(4px)) translateY(-8px); }
    }
    .animate-msg-in { animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-msg-out { animation: msgOut 0.4s ease forwards; }
  </style>
</head>
<body class="bg-transparent h-screen w-screen overflow-hidden flex flex-col justify-between p-6 select-none">

  <!-- Hype Meter HUD -->
  <div id="meter-container" class="w-full max-w-xl mx-auto bg-black/80 border border-white/10 rounded-full p-1 backdrop-blur-md opacity-0 transition-opacity duration-500 relative">
    <div class="relative w-full h-6 rounded-full overflow-hidden bg-zinc-900">
      <div id="hype-bar" class="h-full bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 w-0 transition-all duration-100 ease-out"></div>
      <div class="absolute inset-0 flex items-center justify-center text-xs font-black tracking-widest text-white uppercase drop-shadow">
        Hype Velocity: <span id="meter-text" class="ml-1">0%</span>
      </div>
    </div>
    <div id="milestone-banner" class="absolute top-9 left-1/2 transform -translate-x-1/2 bg-black/95 border px-4 py-1.5 rounded-xl text-center shadow-xl backdrop-blur-sm transform scale-0 opacity-0 transition-all duration-200 min-w-xs pointer-events-none">
      <span id="milestone-text-content" class="text-xs font-black uppercase tracking-wider"></span>
    </div>
  </div>

  <!-- Central Canvas Alert -->
  <div class="flex-grow flex items-center justify-center">
    <div id="alert-card" class="transform scale-0 opacity-0 transition-all duration-300 bg-black/95 border border-red-500/50 p-8 rounded-2xl text-center shadow-2xl shadow-red-500/20 max-w-md">
      <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500 uppercase animate-bounce">
        ⚡ OVERDRIVE ⚡
      </h1>
      <p class="text-zinc-400 font-medium tracking-wide mt-2 uppercase text-sm">Chat Broke the Meter!</p>
    </div>
  </div>

  <!-- Live Stream Chat Box Layer -->
  <div id="overlay-chat-container" class="w-80 max-h-72 overflow-hidden flex flex-col justify-end gap-2 pointer-events-none mb-2 ml-2"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');

    // ElevenLabs API Key Integrated
    const ELEVENLABS_API_KEY = "sk_fa7b3c3927e61181718a00ce2a526ae8685d513fde9f53f3"; 

    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";

    const clientInstance = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentHype = 0;
    const decayRate = 3; 
    let isOverdriveActive = false;
    let triggeredMilestones = { 25: false, 50: false, 75: false };
    let milestoneTimeout = null;

    const hypeBar = document.getElementById('hype-bar');
    const meterText = document.getElementById('meter-text');
    const meterContainer = document.getElementById('meter-container');
    const alertCard = document.getElementById('alert-card');
    const chatContainer = document.getElementById('overlay-chat-container');
    const milestoneBanner = document.getElementById('milestone-banner');
    const milestoneTextContent = document.getElementById('milestone-text-content');

    const channel = clientInstance.channel(`room:${userId}`, {
      config: { broadcast: { self: true } }
    });

    channel
      .on('broadcast', { event: 'hype-increment' }, (payload) => {
        appendOverlayMessage(payload.payload.username, payload.payload.msg);
        
        if (payload.payload.voiceId && payload.payload.voiceId !== "none") {
          generateAndPlayTTS(payload.payload.msg, payload.payload.voiceId);
        }

        if (isOverdriveActive) return;
        
        meterContainer.classList.remove('opacity-0');
        currentHype = Math.min(currentHype + (payload.payload.weight || 6), 100);
        updateVisuals();
        checkMilestones();
        
        if (currentHype >= 100) triggerOverdrive();
      })
      .subscribe();

    async function generateAndPlayTTS(text, voiceId) {
      if (!ELEVENLABS_API_KEY) return;

      try {
        const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "xi-api-key": ELEVENLABS_API_KEY
          },
          body: JSON.stringify({
            text: text,
            model_id: "eleven_flash_v2_5",
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          })
        });

        if (!response.ok) {
          const errData = await response.json();
          console.error("ElevenLabs API Error Details:", errData);
          return;
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        const audio = new Audio(audioUrl);
        
        audio.play().catch(e => {
          console.warn("Autoplay prevented. Click anywhere on the overlay page once to allow audio permissions:", e);
        });
      } catch (error) {
        console.error("TTS Pipeline error:", error);
      }
    }

    function appendOverlayMessage(user, text) {
      const msgNode = document.createElement('div');
      msgNode.className = "bg-black/75 border border-zinc-800/80 text-zinc-100 px-3.5 py-2 rounded-xl text-sm font-medium tracking-wide w-fit max-w-full break-words shadow-md backdrop-blur-sm animate-msg-in";
      msgNode.innerHTML = `<span class="text-purple-400 font-black tracking-wide mr-1.5">${user}:</span><span>${text}</span>`;
      chatContainer.appendChild(msgNode);

      if (chatContainer.children.length > 5) chatContainer.removeChild(chatContainer.children[0]);

      setTimeout(() => {
        if (msgNode && msgNode.parentNode) {
          msgNode.classList.remove('animate-msg-in');
          msgNode.classList.add('animate-msg-out');
          setTimeout(() => { if (msgNode && msgNode.parentNode) chatContainer.removeChild(msgNode); }, 400);
        }
      }, 6000);
    }

    function checkMilestones() {
      if (currentHype >= 75 && !triggeredMilestones[75]) {
        triggerMilestoneAlert("🔥 75% Critical Limit: Engine Glowing!", "border-red-500/50", "text-red-400");
        triggeredMilestones[75] = true;
      } else if (currentHype >= 50 && !triggeredMilestones[50] && !triggeredMilestones[75]) {
        triggerMilestoneAlert("🚀 50% Halfway: Supercharger Engaged!", "border-purple-500/50", "text-purple-400");
        triggeredMilestones[50] = true;
      } else if (currentHype >= 25 && !triggeredMilestones[25] && !triggeredMilestones[50]) {
        triggerMilestoneAlert("⚡ 25% Threshold: Revving Up!", "border-blue-500/50", "text-blue-400");
        triggeredMilestones[25] = true;
      }
    }

    function triggerMilestoneAlert(text, borderColor, textColor) {
      clearTimeout(milestoneTimeout);
      milestoneBanner.className = `absolute top-9 left-1/2 transform -translate-x-1/2 bg-black/95 border px-4 py-1.5 rounded-xl text-center shadow-xl backdrop-blur-sm transition-all duration-200 min-w-xs pointer-events-none ${borderColor}`;
      milestoneTextContent.className = `text-xs font-black uppercase tracking-wider ${textColor}`;
      milestoneTextContent.innerText = text;
      milestoneBanner.classList.remove('scale-0', 'opacity-0');
      milestoneBanner.classList.add('scale-100', 'opacity-100');
      milestoneTimeout = setTimeout(() => {
        milestoneBanner.classList.remove('scale-100', 'opacity-100');
        milestoneBanner.classList.add('scale-0', 'opacity-0');
      }, 2500);
    }

    function updateVisuals() {
      hypeBar.style.width = `${currentHype}%`;
      meterText.innerText = `${Math.floor(currentHype)}%`;
      if (currentHype > 70) document.body.className = "bg-transparent h-screen w-screen overflow-hidden flex flex-col justify-between p-6 select-none shaking engine-flash";
      else if (currentHype > 40) {
        document.body.className = "bg-transparent h-screen w-screen overflow-hidden flex flex-col justify-between p-6 select-none shaking";
      } else document.body.className = "bg-transparent h-screen w-screen overflow-hidden flex flex-col justify-between p-6 select-none";
    }

    setInterval(() => {
      if (isOverdriveActive || currentHype === 0) return;
      currentHype = Math.max(currentHype - decayRate, 0);
      updateVisuals();
      if (currentHype < 75) triggeredMilestones[75] = false;
      if (currentHype < 50) triggeredMilestones[50] = false;
      if (currentHype < 25) triggeredMilestones[25] = false;
      if (currentHype === 0) meterContainer.classList.add('opacity-0');
    }, 1000);

    function triggerOverdrive() {
      isOverdriveActive = true;
      currentHype = 100;
      updateVisuals();
      milestoneBanner.className = "absolute top-9 left-1/2 transform -translate-x-1/2 bg-black/95 border px-4 py-1.5 rounded-xl text-center shadow-xl backdrop-blur-sm transform scale-0 opacity-0 transition-all duration-200 min-w-xs pointer-events-none";
      alertCard.classList.remove('scale-0', 'opacity-0');
      alertCard.classList.add('scale-100', 'opacity-100');
      setTimeout(() => {
        alertCard.classList.remove('scale-100', 'opacity-100');
        alertCard.classList.add('scale-0', 'opacity-0');
        let drainDown = setInterval(() => {
          currentHype = Math.max(currentHype - 10, 0);
          updateVisuals();
          if (currentHype === 0) {
            clearInterval(drainDown);
            triggeredMilestones = { 25: false, 50: false, 75: false };
            isOverdriveActive = false;
          }
        }, 100);
      }, 5000);
    }
  </script>
</body>
</html>
