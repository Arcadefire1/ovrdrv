<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV Live Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-transparent text-white min-h-screen overflow-hidden font-mono p-10 flex flex-col justify-end items-start">

  <!-- Alert Stream Container -->
  <div id="alert-container" class="space-y-4 w-full max-w-lg"></div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const targetStreamer = urlParams.get('user') || 'teststreamer';

    let lastProcessedId = null;

    // Programmatically bypass autoplay restrictions on load via Web Audio API context kickstart
    function forceUnlockAudio() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          const ctx = new AudioContext();
          if (ctx.state === 'suspended') {
            ctx.resume();
          }
          // Play a silent micro-buffer to satisfy browser user-gesture policy programmatically
          const buffer = ctx.createBuffer(1, 1, 22050);
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(ctx.destination);
          source.start(0);
        }
        
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const dummy = new SpeechSynthesisUtterance("");
          window.speechSynthesis.speak(dummy);
        }
      } catch (e) {
        console.log("Auto-unlock attempt:", e);
      }
    }

    function speakMessage(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
      }
    }

    function renderAlert(message) {
      const container = document.getElementById('alert-container');
      
      const alertBox = document.createElement('div');
      alertBox.className = "bg-zinc-900/90 border-2 border-indigo-500 rounded-2xl p-5 shadow-2xl backdrop-blur-md transform transition-all duration-300";
      alertBox.innerHTML = `
        <div class="text-[10px] uppercase tracking-wider text-indigo-400 font-bold mb-1">⚡ Live Alert - ${targetStreamer}</div>
        <div class="text-lg font-bold text-white break-words">${escapeHtml(message)}</div>
      `;

      container.appendChild(alertBox);
      speakMessage(message);

      setTimeout(() => {
        alertBox.classList.add('opacity-0', 'transition-opacity', 'duration-500');
        setTimeout(() => alertBox.remove(), 500);
      }, 6000);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    async function pollTriggers() {
      try {
        const { data, error } = await supabaseClient
          .from('triggers')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(1);

        if (data && data.length > 0) {
          const latest = data[0];
          if (!lastProcessedId) {
            lastProcessedId = latest.id;
          } else if (latest.id !== lastProcessedId) {
            lastProcessedId = latest.id;
            const recordStreamer = latest.payload?.streamer;
            if (!recordStreamer || recordStreamer === targetStreamer) {
              renderAlert(latest.payload?.message || "New alert received!");
            }
          }
        }
      } catch (err) {
        console.error("Polling error:", err);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      forceUnlockAudio();
      pollTriggers();
      setInterval(pollTriggers, 2000);
    });
  </script>
</body>
</html>
