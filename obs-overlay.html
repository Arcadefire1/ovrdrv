<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV Overlay</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(0px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(2px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(2px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(0deg); }
    }
    .shaking {
      animation: shake 0.5s infinite;
    }
    .overdrive-flash {
      animation: pulse 0.2s infinite alternate;
    }
    @keyframes pulse {
      0% { background-color: rgba(239, 68, 68, 0.4); }
      100% { background-color: rgba(59, 130, 246, 0.4); }
    }
    
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }
    .animate-chat {
      animation: fadeInOut 6s forwards;
    }
  </style>
</head>
<body class="bg-transparent h-screen w-screen overflow-hidden flex flex-col justify-between p-6 select-none">

  <!-- Audio Unlock Screen Overlay (For Browser Testing/Viewing) -->
  <div id="audio-unlock-overlay" class="fixed inset-0 bg-black/85 text-white flex flex-col justify-center items-center z-50 cursor-pointer font-sans transition-opacity duration-300">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl text-center shadow-2xl max-w-sm">
      <div class="text-3xl mb-2">🔊</div>
      <h2 class="text-xl font-bold tracking-tight">Click Anywhere to Start</h2>
      <p class="text-zinc-400 text-xs mt-2 uppercase tracking-wide">Enables TTS Audio Playback for this session</p>
    </div>
  </div>

  <!-- Hype Meter HUD (Top of stream) -->
  <div id="meter-container" class="w-full max-w-xl mx-auto bg-black/60 border border-white/10 rounded-full p-1 backdrop-blur-md opacity-0 transition-opacity duration-500">
    <div class="relative w-full h-6 rounded-full overflow-hidden bg-zinc-900">
      <div id="hype-bar" class="h-full bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 w-0 transition-all duration-100 ease-out"></div>
      <div class="absolute inset-0 flex items-center justify-center text-xs font-black tracking-widest text-white uppercase drop-shadow">
        Hype Velocity: <span id="meter-text" class="ml-1">0%</span>
      </div>
    </div>
  </div>

  <!-- Central Canvas for Detonation Alert -->
  <div class="flex-grow flex items-center justify-center">
    <div id="alert-card" class="transform scale-0 opacity-0 transition-all duration-300 bg-black/90 border border-red-500/50 p-8 rounded-2xl text-center shadow-2xl shadow-red-500/20 max-w-md">
      <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500 uppercase animate-bounce">
        ⚡ OVERDRIVE ⚡
      </h1>
      <p class="text-zinc-400 font-medium tracking-wide mt-2 uppercase text-sm">Chat Broke the Meter!</p>
    </div>
  </div>

  <!-- Chat Overlay Popups (Bottom left of stream) -->
  <div id="chat-container" class="w-full max-w-md flex flex-col gap-2 pointer-events-none"></div>

  <script>
    // --- Audio Autoplay Unlock Logic ---
    let audioCtx = null;

    function initAudioContext() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
    }

    function unlockAudio() {
      initAudioContext();

      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      // Warm up audio buffer
      if (audioCtx) {
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
      }

      // Hide the overlay screen
      const unlockOverlay = document.getElementById('audio-unlock-overlay');
      if (unlockOverlay) {
        unlockOverlay.style.opacity = '0';
        setTimeout(() => {
          unlockOverlay.style.display = 'none';
        }, 300);
      }

      // Clean up event listeners
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('keydown', unlockAudio);
    }

    document.addEventListener('click', unlockAudio);
    document.addEventListener('keydown', unlockAudio);

    // --- Overlay Application Logic ---
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');

    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";

    if (!userId) {
      document.body.innerHTML = "<div class='text-white p-4 font-mono'>Missing ?user= parameter</div>";
    }

    const clientInstance = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentHype = 0;
    const decayRate = 3; 
    let isOverdriveActive = false;

    const hypeBar = document.getElementById('hype-bar');
    const meterText = document.getElementById('meter-text');
    const meterContainer = document.getElementById('meter-container');
    const alertCard = document.getElementById('alert-card');
    const chatContainer = document.getElementById('chat-container');

    // Valid Voice ID Mappings
    const VOICE_MAP = {
      'Rachel': '21m00Tcm4TlvDq8ikWAM',
      'Charlie': 'IKne3meq5aSn9XLyUdCD',
      'Domi': 'AZnzlk1XvdvUeBnXmlld',
      'Bella': 'EXAVITQu4vr4xnSDxMaL',
      'Antoni': 'ErXwobaYiN019PkySvjV'
    };

    const channel = clientInstance.channel(`room:${userId}`, {
      config: { broadcast: { self: true } }
    });

    channel
      .on('broadcast', { event: 'hype-increment' }, (payload) => {
        const data = payload.payload;

        // Display Chat Popup
        if (data.message) {
          displayChatMessage(data.username || 'Anonymous', data.message);
          
          // Trigger TTS if voice character is selected
          if (data.voice) {
            playTTS(data.message, data.voice);
          }
        }

        // Handle Hype Meter Logic
        if (isOverdriveActive) return;
        
        meterContainer.classList.remove('opacity-0');
        currentHype = Math.min(currentHype + (data.weight || 6), 100);
        updateVisuals();
        
        if (currentHype >= 100) {
          triggerOverdrive();
        }
      })
      .subscribe();

    function displayChatMessage(username, message) {
      const msgEl = document.createElement('div');
      msgEl.className = 'animate-chat bg-black/80 border border-zinc-800 rounded-xl px-4 py-2 text-white shadow-lg backdrop-blur-md font-mono text-sm inline-block self-start max-w-full break-words';
      msgEl.innerHTML = `<span class="font-bold text-indigo-400">${username}:</span> ${message}`;
      
      chatContainer.appendChild(msgEl);

      // Remove element after animation completes
      setTimeout(() => {
        msgEl.remove();
      }, 6000);
    }

    async function playTTS(text, voiceName) {
      const voiceId = VOICE_MAP[voiceName] || VOICE_MAP['Rachel'];

      try {
        // 1. Attempt ElevenLabs AI Voice via Supabase Edge Function
        const response = await fetch(`${SUPABASE_URL}/functions/v1/elevenlabs-tts`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            text: text,
            voice_id: voiceId
          })
        });

        // If ElevenLabs fails (e.g. 402 Quota Reached), play fallback tone
        if (!response.ok) {
          console.warn(`ElevenLabs API unavailable (Status ${response.status}). Playing fallback tone.`);
          playFallbackTone();
          return;
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        const audio = new Audio(audioUrl);
        await audio.play();

      } catch (err) {
        console.warn('Network error on ElevenLabs TTS:', err);
        playFallbackTone();
      }
    }

    // --- Reliable Audio Fallback Tone ---
    async function playFallbackTone() {
      initAudioContext();
      if (audioCtx && audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }
      
      if (!audioCtx) return;
      
      try {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 note
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
      } catch (e) {
        console.error('Fallback tone error:', e);
      }
    }

    function updateVisuals() {
      hypeBar.style.width = `${currentHype}%`;
      meterText.innerText = `${Math.floor(currentHype)}%`;

      if (currentHype > 70) {
        document.body.classList.add('shaking', 'overdrive-flash');
      } else if (currentHype > 40) {
        document.body.classList.add('shaking');
        document.body.classList.remove('overdrive-flash');
      } else {
        document.body.classList.remove('shaking', 'overdrive-flash');
      }
    }

    setInterval(() => {
      if (isOverdriveActive || currentHype === 0) return;
      currentHype = Math.max(currentHype - decayRate, 0);
      updateVisuals();

      if (currentHype === 0) {
        meterContainer.classList.add('opacity-0');
      }
    }, 1000);

    function triggerOverdrive() {
      isOverdriveActive = true;
      currentHype = 100;
      updateVisuals();

      alertCard.classList.remove('scale-0', 'opacity-0');
      alertCard.classList.add('scale-100', 'opacity-100');
      
      setTimeout(() => {
        alertCard.classList.remove('scale-100', 'opacity-100');
        alertCard.classList.add('scale-0', 'opacity-0');
        
        let drainDown = setInterval(() => {
          currentHype = Math.max(currentHype - 10, 0);
          updateVisuals();
          if (currentHype === 0) {
            clearInterval(drainDown);
            isOverdriveActive = false;
          }
        }, 100);
      }, 5000);
    }
  </script>
</body>
</html>
