<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV OBS Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-transparent text-white font-mono overflow-hidden p-10">

  <!-- Dynamic Alert Box Container -->
  <div id="alert-container" class="opacity-0 transition-all duration-300 transform translate-y-4 max-w-lg bg-zinc-900/90 border border-indigo-500/50 backdrop-blur-md rounded-2xl p-6 shadow-2xl flex items-center gap-4">
    <div class="bg-indigo-600 text-white p-3 rounded-xl font-black text-lg">⚡</div>
    <div>
      <span class="text-[10px] uppercase tracking-wider text-indigo-400 block font-bold">New Stream Alert</span>
      <p id="alert-text" class="text-sm font-semibold text-white mt-1"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');
    let streamerSettings = { volume: 80, voice: 'default' };

    async function initOverlay() {
      if (!username) return;

      // Fetch profile settings and user ID
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('id, settings')
        .eq('username', username)
        .single();

      if (!profile) return;
      if (profile.settings) streamerSettings = profile.settings;

      // Listen for real-time triggers targeting this user
      supabaseClient
        .channel(`public:triggers:user_id=eq.${profile.id}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'triggers',
          filter: `user_id=eq.${profile.id}`
        }, (payload) => {
          handleIncomingAlert(payload.new);
        })
        .subscribe();
    }

    function handleIncomingAlert(trigger) {
      if (!trigger || !trigger.payload) return;
      
      const message = trigger.payload.message;
      const alertBox = document.getElementById('alert-container');
      const alertText = document.getElementById('alert-text');

      alertText.innerText = message;
      
      // Animate In
      alertBox.classList.remove('opacity-0', 'translate-y-4');
      alertBox.classList.add('opacity-100', 'translate-y-0');

      // Trigger Speech / Audio Fallback logic based on streamerSettings
      playAudioAlert(message);

      // Animate Out after 5 seconds
      setTimeout(() => {
        alertBox.classList.remove('opacity-100', 'translate-y-0');
        alertBox.classList.add('opacity-0', 'translate-y-4');
      }, 5000);
    }

    function playAudioAlert(text) {
      if (!('speechSynthesis' in window)) return;
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.volume = (streamerSettings.volume || 80) / 100;

      // Apply voice adjustments based on selected style
      if (streamerSettings.voice === 'deep') {
        utterance.pitch = 0.5;
      } else if (streamerSettings.voice === 'robot') {
        utterance.pitch = 1.8;
        utterance.rate = 1.2;
      }

      window.speechSynthesis.speak(utterance);
    }

    window.addEventListener('DOMContentLoaded', initOverlay);
  </script>
</body>
</html>
