<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV SaaS - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-mono">

  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
    <div class="text-center space-y-1">
      <h1 class="text-xl font-bold text-indigo-400">⚡ OVRDRV SaaS</h1>
      <p class="text-xs text-zinc-400">Sign in or create an account to manage your stream.</p>
    </div>

    <!-- Auth Form -->
    <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Email Address</label>
        <input type="email" id="email-input" placeholder="name@example.com" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" required>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Password</label>
        <input type="password" id="password-input" placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" required>
      </div>

      <div id="error-message" class="text-red-400 text-xs hidden"></div>

      <div class="flex gap-2 pt-2">
        <button type="submit" name="action" value="signin" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2.5 rounded-xl font-bold text-xs transition-all cursor-pointer shadow-lg shadow-indigo-600/30">
          Sign In
        </button>
        <button type="button" onclick="handleSignUp()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2.5 rounded-xl font-bold text-xs transition-all cursor-pointer">
          Register
        </button>
      </div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value.trim();
      const errorDiv = document.getElementById('error-message');
      errorDiv.classList.add('hidden');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorDiv.innerText = error.message;
        errorDiv.classList.remove('hidden');
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    async function handleSignUp() {
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value.trim();
      const errorDiv = document.getElementById('error-message');
      errorDiv.classList.add('hidden');

      if (!email || !password) {
        errorDiv.innerText = "Please enter an email and password to register.";
        errorDiv.classList.remove('hidden');
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        errorDiv.innerText = error.message;
        errorDiv.classList.remove('hidden');
      } else {
        alert('Registration successful! Please check your email for confirmation, or log in if email verification is disabled in your Supabase project.');
      }
    }
  </script>
</body>
</html>
