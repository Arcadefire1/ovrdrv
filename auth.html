<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV SaaS - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-mono">

  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
    <div class="text-center space-y-1">
      <h1 class="text-xl font-bold text-indigo-400">⚡ OVRDRV SaaS</h1>
      <p class="text-xs text-zinc-400">Sign in or create an account to manage your stream.</p>
    </div>

    <!-- Google Sign-In Button -->
    <button onclick="handleGoogleSignIn()" class="w-full bg-white hover:bg-zinc-200 text-zinc-900 font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-2 transition-all cursor-pointer shadow-md">
      <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
      Continue with Google
    </button>

    <div class="flex items-center gap-4 text-zinc-600 text-xs">
      <div class="flex-1 border-t border-zinc-800"></div>
      <span>OR</span>
      <div class="flex-1 border-t border-zinc-800"></div>
    </div>

    <!-- Auth Form -->
    <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Email Address</label>
        <input type="email" id="email-input" placeholder="name@example.com" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" required>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Password</label>
        <input type="password" id="password-input" placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" required>
      </div>

      <div id="error-message" class="text-red-400 text-xs hidden"></div>

      <div class="flex gap-2 pt-2">
        <button type="submit" name="action" value="signin" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2.5 rounded-xl font-bold text-xs transition-all cursor-pointer shadow-lg shadow-indigo-600/30">
          Sign In
        </button>
        <button type="button" onclick="handleSignUp()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2.5 rounded-xl font-bold text-xs transition-all cursor-pointer">
          Register
        </button>
      </div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value.trim();
      const errorDiv = document.getElementById('error-message');
      errorDiv.classList.add('hidden');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorDiv.innerText = error.message;
        errorDiv.classList.remove('hidden');
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    async function handleSignUp() {
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value.trim();
      const errorDiv = document.getElementById('error-message');
      errorDiv.classList.add('hidden');

      if (!email || !password) {
        errorDiv.innerText = "Please enter an email and password to register.";
        errorDiv.classList.remove('hidden');
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        errorDiv.innerText = error.message;
        errorDiv.classList.remove('hidden');
      } else {
        alert('Registration successful! Please check your email for confirmation.');
      }
    }

    async function handleGoogleSignIn() {
      const { data, error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + window.location.pathname.replace('auth.html', 'dashboard.html')
        }
      });

      if (error) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerText = error.message;
        errorDiv.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
