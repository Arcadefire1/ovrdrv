<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV Creator Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-start p-6 font-mono">

  <div class="w-full max-w-2xl bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl mt-10">
    <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
      <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500 uppercase">
        ⚡ OVRDRV Dashboard ⚡
      </h1>
      <span id="status-badge" class="text-xs bg-zinc-800 text-zinc-400 px-3 py-1 rounded-full uppercase tracking-wider">Not Connected</span>
    </div>

    <!-- Login / User ID Setup Section -->
    <div id="auth-section" class="mb-8">
      <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-2">Your Streamer ID / Username</label>
      <div class="flex gap-2">
        <input type="text" id="username-input" placeholder="e.g. streamer_joe" class="flex-grow bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
        <button onclick="connectUser()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl font-bold transition-all cursor-pointer">Load Session</button>
      </div>
    </div>

    <!-- Dashboard Main Panel (Hidden until user loaded) -->
    <div id="dashboard-panel" class="hidden space-y-6">
      <!-- Overlay URL Generator -->
      <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-xl">
        <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-2">Your Live Stream Overlay URL</label>
        <div class="flex gap-2">
          <input type="text" id="overlay-url-output" readonly class="flex-grow bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-indigo-300 text-xs select-all">
          <button onclick="copyOverlayUrl()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-xs font-bold transition-all cursor-pointer">Copy</button>
        </div>
        <p class="text-[10px] text-zinc-500 mt-2">Open this URL in your web browser source or monitor to display your live alert overlay.</p>
      </div>

      <!-- Quick Launch Links -->
      <div class="grid grid-cols-2 gap-4">
        <a id="launch-chat-btn" href="#" target="_blank" class="block bg-zinc-800 hover:bg-zinc-700 text-center py-3 rounded-xl font-bold text-sm transition-all border border-zinc-700">
          🎮 Open Controller Chat
        </a>
        <a id="launch-overlay-btn" href="#" target="_blank" class="block bg-zinc-800 hover:bg-zinc-700 text-center py-3 rounded-xl font-bold text-sm transition-all border border-zinc-700">
          📺 Open Live Overlay
        </a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function connectUser() {
      const username = document.getElementById('username-input').value.trim().toLowerCase();
      if (!username) {
        alert('Please enter a valid username.');
        return;
      }

      const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
      const overlayUrl = `${baseUrl}obs-overlay.html?user=${username}`;
      const chatUrl = `${baseUrl}chat.html?user=${username}`;

      document.getElementById('overlay-url-output').value = overlayUrl;
      document.getElementById('launch-overlay-btn').href = overlayUrl;
      document.getElementById('launch-chat-btn').href = chatUrl;

      document.getElementById('dashboard-panel').classList.remove('hidden');
      const badge = document.getElementById('status-badge');
      badge.innerText = `Connected: ${username}`;
      badge.className = 'text-xs bg-green-950 text-green-400 border border-green-800 px-3 py-1 rounded-full uppercase tracking-wider';

      localStorage.setItem('ovrdrv_user', username);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedUser = localStorage.getItem('ovrdrv_user');
      if (savedUser) {
        document.getElementById('username-input').value = savedUser;
        connectUser();
      }
    });

    function copyOverlayUrl() {
      const copyText = document.getElementById('overlay-url-output');
      copyText.select();
      navigator.clipboard.writeText(copyText.value);
      alert('Overlay URL copied to clipboard!');
    }
  </script>
</body>
</html>
