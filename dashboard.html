<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV SaaS - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-mono">

  <div class="w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
    <!-- Header -->
    <div class="border-b border-zinc-800 pb-4 flex justify-between items-center">
      <div>
        <h1 class="text-lg font-bold text-indigo-400">⚡ Creator Dashboard</h1>
        <p id="user-email" class="text-xs text-zinc-400">Loading session...</p>
      </div>
      <button onclick="handleLogout()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-xl text-xs transition-all cursor-pointer">
        Sign Out
      </button>
    </div>

    <!-- Links Section -->
    <div class="space-y-4">
      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Your Controller Hub Link</label>
        <div class="flex gap-2">
          <input type="text" id="controller-link" readonly class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-3 py-2 text-xs text-zinc-300 focus:outline-none">
          <button onclick="copyLink('controller-link')" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer shadow-lg shadow-indigo-600/30">Copy</button>
        </div>
      </div>

      <div>
        <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1">Your Live OBS Overlay Link</label>
        <div class="flex gap-2">
          <input type="text" id="overlay-link" readonly class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-3 py-2 text-xs text-zinc-300 focus:outline-none">
          <button onclick="copyLink('overlay-link')" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer shadow-lg shadow-indigo-600/30">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.addEventListener('DOMContentLoaded', async () => {
      const { data: { session }, error } = await supabaseClient.auth.getSession();

      if (!session || error) {
        window.location.href = 'auth.html';
        return;
      }

      const userEmail = session.user.email;
      const userId = session.user.id; // Using user ID as the unique streamer token

      document.getElementById('user-email').innerText = userEmail;

      const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', '');
      
      document.getElementById('controller-link').value = `${baseUrl}chat.html?user=${userId}`;
      document.getElementById('overlay-link').value = `${baseUrl}live.html?user=${userId}`;
    });

    async function handleLogout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'auth.html';
    }

    function copyLink(elementId) {
      const input = document.getElementById(elementId);
      input.select();
      navigator.clipboard.writeText(input.value);
      alert('Link copied to clipboard!');
    }
  </script>
</body>
</html>
