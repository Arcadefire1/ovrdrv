<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVRDRV Chat Room</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col antialiased">

  <!-- Header Section -->
  <header class="border-b border-zinc-800 bg-zinc-900/50 p-4 backdrop-blur-md flex items-center justify-between sticky top-0 z-10">
    <div>
      <h1 class="font-black tracking-tight text-xl text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 uppercase">
        OVRDRV Chat
      </h1>
      <p class="text-xs text-zinc-500 uppercase tracking-widest mt-0.5">Spam to burst the engine</p>
    </div>
    <div class="flex items-center gap-2 bg-zinc-950 px-3 py-1.5 rounded-full border border-zinc-800">
      <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
      <span class="text-xs font-mono font-bold text-zinc-400 uppercase tracking-wider">Live Sync Active</span>
    </div>
  </header>

  <!-- Messages Stream Area -->
  <main id="chat-stream" class="flex-grow p-4 overflow-y-auto space-y-3 flex flex-col justify-end">
    <div class="text-xs text-zinc-600 font-mono bg-zinc-900/30 border border-zinc-900 p-3 rounded-lg max-w-sm">
      [SYSTEM]: Channel connection initialized. Type hype words or spam emojis together to trigger the streamer's layout alert engine.
    </div>
  </main>

  <!-- Interactive Input Wrapper -->
  <footer class="p-4 border-t border-zinc-800 bg-zinc-900/40 backdrop-blur-md sticky bottom-0">
    <form id="chat-form" onsubmit="event.preventDefault();" class="flex flex-col gap-2 max-w-3xl mx-auto">
      <div class="flex gap-2 items-center">
        <!-- Username input configuration -->
        <input 
          id="username-input" 
          type="text" 
          placeholder="Username (Optional)" 
          maxlength="20"
          class="w-40 bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500 text-zinc-300 font-mono"
        />
        <input 
          id="chat-input" 
          type="text" 
          placeholder="Send a message to push the meter..." 
          autocomplete="off"
          maxlength="120"
          class="flex-grow bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600 font-medium"
        />
        <button 
          type="submit"
          class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold text-sm uppercase tracking-wide px-6 py-3 rounded-xl shadow-lg shadow-purple-900/20 active:scale-98 transition-all duration-100"
        >
          Send
        </button>
      </div>
    </form>
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');

    const SUPABASE_URL = "https://nkcopkrondaoqbavhnon.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_2OAHkliiR6kB9f6pP6ihkg_6iKqmPA0";

    if (!userId) {
      document.body.innerHTML = "<div class='p-6 text-red-400 font-mono'>Fatal Error: Missing ?user= stream parameter.</div>";
    }

    const ovrdrvSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const chatStream = document.getElementById('chat-stream');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const usernameInput = document.getElementById('username-input');

    const channel = ovrdrvSupabase.channel(`room:${userId}`, {
      config: { broadcast: { self: true } }
    });

    channel
      .on('broadcast', { event: 'hype-increment' }, (payload) => {
        appendMessage(payload.payload.username, payload.payload.msg);
      })
      .subscribe();

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      const text = chatInput.value.trim();
      const user = usernameInput.value.trim() || "Anonymous";
      if (!text) return false;

      let velocityWeight = 6;
      
      channel.send({
        type: 'broadcast',
        event: 'hype-increment',
        payload: {
          username: user,
          msg: text,
          weight: velocityWeight
        }
      });

      chatInput.value = '';
      return false;
    });

    function appendMessage(user, msg) {
      const msgNode = document.createElement('div');
      msgNode.className = "text-sm bg-zinc-900 border border-zinc-800/60 px-4 py-2.5 rounded-xl max-w-fit break-words font-medium animate-fade-in text-zinc-200";
      msgNode.innerHTML = `<span class="text-blue-400 font-bold mr-1.5">${user}:</span>${msg}`;
      
      chatStream.appendChild(msgNode);
      chatStream.scrollTop = chatStream.scrollHeight;

      if (chatStream.children.length > 30) {
        chatStream.removeChild(chatStream.children[1]);
      }
    }
  </script>
</body>
</html>
